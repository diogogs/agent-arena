name: arena-gym

on:
  workflow_dispatch:
  schedule:
    - cron: "45 11 * * 1"  # Mondays 11:45 UTC — before the US open, per pre-registration

permissions:
  contents: write

concurrency:
  group: arena-gym
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Refresh archives (all granularities)
        run: |
          uv run python - <<'EOF'
          from arena.data import update_archive
          from arena.promote import UNIVERSE
          for s in UNIVERSE:
              update_archive(s, "15m", "60d")
              update_archive(s, "5m", "60d")
              update_archive(s, "1h", "730d")
          EOF
      - name: Weekly retrain + gated promotion
        run: uv run python -m arena.promote
      - name: Rebuild site
        run: uv run python -m arena.site
      - name: Commit registry, promotions and site
        run: |
          git config user.name "arena-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "gym: weekly retrain $(date -u +%Y-%m-%d)"
          git push
